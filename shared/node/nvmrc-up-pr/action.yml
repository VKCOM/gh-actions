name: 'Node.js up PR'
description: 'Create PR with up Node.js version'
inputs:
  token:
    required: true
    description: 'token with access to your repository'

runs:
  using: "composite"
  steps:
    - name: Run update version
      run: curl -s https://nodejs.org/dist/index.json | jq 'max_by(.version | ltrimstr("v") | split(".") | map(tonumber)) | .version' -r > .nvmrc
      shell: bash

    - name: Create Pull Request
      run: |
        PREV_BRANCH=$(git branch --show-current)
        trap 'git checkout "$PREV_BRANCH"' EXIT
        BRANCH="github-actions/build/tools/nvm-up"
        git checkout -B "$BRANCH"
        git add .nvmrc
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        VERSION=$(cat .nvmrc)
        git commit -m "build(tools): Node.js version update to ${VERSION}"
        git push origin "$BRANCH" --force
        if ! gh pr create \
          --title "Node.js version update to ${VERSION}" \
          --body "Automated Node.js version update to [${VERSION}](https://nodejs.org/en/blog/release/${VERSION})

        ## Release notes
        -" \
          --head "$BRANCH"; then
          echo "PR already exists, updating"
          gh pr edit "$BRANCH" \
            --title "Node.js version update to ${VERSION}" \
            --body "Automated Node.js version update to [${VERSION}](https://nodejs.org/en/blog/release/${VERSION})

        ## Release notes
        -"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
