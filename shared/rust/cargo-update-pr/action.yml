name: 'Cargo update PR'
description: 'Create PR with cargo update'
inputs:
  token:
    required: true
    description: 'token with access to your repository'
  
runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Set up cargo cache
      uses: VKCOM/gh-actions/shared/rust/cargo-cache@main

    - name: Run cargo update
      run: cargo update --verbose
      shell: bash

    - name: Create Pull Request
      run: |
        PREV_BRANCH=$(git branch --show-current)
        trap 'git checkout "$PREV_BRANCH"' EXIT
        BRANCH="github-actions/build/deps/cargo-update"
        git checkout -B "$BRANCH"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "build(deps): cargo update"
        git push origin "$BRANCH" --force
        if ! gh pr create \
          --title "Cargo update" \
          --body "Automated cargo update" \
          --label "dependencies" \
          --label "rust" \
          --head "$BRANCH"; then
          echo "PR already exists, updating"
          gh pr edit "$BRANCH" \
            --title "Cargo update" \
            --body "Automated cargo update" \
            --add-label "dependencies" \
            --add-label "rust"
        fi
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
